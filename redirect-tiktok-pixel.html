<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Liberado!</title>

  <!-- ============================================================
       CONFIGURAÇÕES — edite apenas esta seção
  ============================================================ -->
  <script>
    var CONFIG = {
      TIKTOK_PIXEL_ID: "D6KMNARC77U5049JV9IG",
      REDIRECT_URL:    "https://t.me/acessarv1ip_bot",
      REDIRECT_DELAY:  4000,                     // ms antes de redirecionar
      CURRENCY:        "BRL",
      VALUE:           9.90,                    // valor da compra
      ORDER_ID:        ""                        // deixe vazio para gerar automaticamente
    };
  </script>
  <!-- ============================================================ -->

  <!-- TikTok Pixel Base Code -->
  <script>
    !function (w, d, t) {
      w.TiktokAnalyticsObject=t;
      var ttq=w[t]=w[t]||[];
      ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"];
      ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};
      for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
      ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e};
      ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{};ttq._i[e]=[];ttq._i[e]._u=r;ttq._l=ttq._l||{};ttq._l[e]=new Date;var a=document.createElement("script");a.type="text/javascript";a.async=!0;a.src=r+"?sdkid="+e+"&lib="+t;var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(a,s)};
      ttq.load(CONFIG.TIKTOK_PIXEL_ID);
      ttq.page();
    }(window, document, 'ttq');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #fff;
      padding: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #0aff6820;
      border: 2px solid #0aff68;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 #0aff6840; }
      50%       { box-shadow: 0 0 0 12px #0aff6800; }
    }

    .icon-wrap svg { width: 36px; height: 36px; color: #0aff68; }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .5rem;
      color: #fff;
    }

    .subtitle {
      font-size: .95rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .progress-bar {
      height: 4px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0aff68, #00d4ff);
      border-radius: 99px;
      width: 0%;
      transition: width linear;
    }

    .countdown {
      font-size: .85rem;
      color: #555;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0aff68;
      color: #000;
      font-weight: 700;
      font-size: .95rem;
      padding: .75rem 1.75rem;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.97); }

    .btn svg { width: 18px; height: 18px; }

    .pixel-badge {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #0aff68;
      animation: blink 1.4s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <!-- checkmark icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>Compra confirmada! 🎉</h1>
  <p class="subtitle">
    Obrigado pela sua compra.<br>
    Você será redirecionado para o grupo de entrega em instantes.
  </p>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <p class="countdown" id="countdownText">Redirecionando em <strong id="secLeft">4</strong>s…</p>

  <a href="#" class="btn" id="manualBtn">
    <!-- telegram icon -->
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.504-1.356 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
    </svg>
    Acessar grupo agora
  </a>

  <div class="pixel-badge">
    <span class="dot"></span>
    Evento de compra registrado
  </div>
</div>

<script>
  (function () {
    // Gera order_id único se não informado
    var orderId = CONFIG.ORDER_ID || ("order_" + Date.now() + "_" + Math.random().toString(36).substr(2,6));

    // Dispara o evento Purchase no TikTok Pixel
    ttq.track("Purchase", {
      content_id:   orderId,
      content_type: "product",
      currency:     CONFIG.CURRENCY,
      value:        CONFIG.VALUE
    });

    // Configura botão manual
    var btn = document.getElementById("manualBtn");
    btn.setAttribute("href", CONFIG.REDIRECT_URL);

    // Barra de progresso + countdown
    var fill   = document.getElementById("progressFill");
    var secEl  = document.getElementById("secLeft");
    var delay  = CONFIG.REDIRECT_DELAY;
    var start  = Date.now();
    var tick;

    fill.style.transitionDuration = delay + "ms";
    requestAnimationFrame(function () {
      fill.style.width = "100%";
    });

    tick = setInterval(function () {
      var elapsed = Date.now() - start;
      var left    = Math.max(0, Math.ceil((delay - elapsed) / 1000));
      secEl.textContent = left;
      if (elapsed >= delay) {
        clearInterval(tick);
        window.location.href = CONFIG.REDIRECT_URL;
      }
    }, 200);
  })();
</script>
</body>
</html>
